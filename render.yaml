# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Runs the bot as a free Web Service. On Render the process gets a PORT and a public
# RENDER_EXTERNAL_URL, so the bot serves Telegram via *webhook* (binding the port that
# Render's health check requires). Storage is Turso (libSQL over HTTP) so data survives
# the free tier's restarts/sleeps — the free tier has no persistent disk.
services:
  - type: web
    name: fuel-tracker
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false          # set as secrets in the Render dashboard
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
